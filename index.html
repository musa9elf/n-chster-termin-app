<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nächster Termin">
  <meta name="theme-color" content="#1a1a1a">
  
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  
  <title>Nächster Termin</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .app {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: -webkit-fill-available;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 431px) {
      .app { border-radius: 44px; height: 92vh; max-height: 900px; }
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
    }
    .settings-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
    }
    .next-card {
      background: linear-gradient(145deg, #1e1e2e 0%, #1a1a2e 100%);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(10, 132, 255, 0.2);
    }
    .next-badge {
      display: inline-block;
      background: rgba(10, 132, 255, 0.2);
      color: #0a84ff;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .next-time {
      font-size: 38px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
    }
    .next-title {
      font-size: 20px;
      font-weight: 600;
      color: #e5e5e5;
      margin-bottom: 16px;
    }
    .countdown {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 132, 255, 0.12);
      padding: 10px 18px;
      border-radius: 30px;
      font-weight: 700;
      color: #0a84ff;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }
    .appointment-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .list-item {
      background: #252525;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .list-date-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 8px 12px;
      min-width: 48px;
      text-align: center;
    }
    .list-day { font-weight: 800; font-size: 18px; color: #0a84ff; }
    .list-month { font-size: 10px; font-weight: 600; color: #98989d; }
    .list-info { flex: 1; }
    .list-time { font-weight: 700; font-size: 15px; color: #ffffff; }
    .list-title { font-weight: 500; font-size: 14px; color: #e5e5e5; }
    .list-delete {
      background: none;
      border: none;
      color: #ff453a;
      font-size: 20px;
      padding: 8px;
      cursor: pointer;
    }
    .add-button {
      background: #0a84ff;
      border: none;
      border-radius: 30px;
      padding: 16px;
      color: white;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      margin-top: auto;
    }
    .add-button:active { background: #0066cc; }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px 24px;
      background: #1a1a1a;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #98989d;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
    }
    .nav-item.active { color: #0a84ff; }
    .nav-icon { font-size: 22px; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      justify-content: flex-end;
      align-items: flex-end;
    }
    .modal-overlay.active { display: flex; }
    .modal-sheet {
      background: #1e1e1e;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 30px;
      width: 100%;
      max-width: 430px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px;
      height: 5px;
      background: #3a3a3c;
      border-radius: 3px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      font-weight: 600;
      font-size: 13px;
      color: #98989d;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 16px;
      background: #1a1a1a;
      color: #ffffff;
      -webkit-appearance: none;
      box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: #0a84ff; }
    input[type="date"], input[type="time"] {
      color-scheme: dark;
      min-height: 48px;
    }
    .btn-primary {
      background: #0a84ff;
      border: none;
      color: white;
      font-weight: 700;
      padding: 16px;
      border-radius: 30px;
      width: 100%;
      font-size: 17px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary:active { background: #0066cc; }
    .btn-secondary {
      background: transparent;
      border: none;
      color: #98989d;
      font-weight: 600;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .settings-card {
      background: #252525;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .settings-label { font-weight: 600; color: #ffffff; }
    .settings-desc { font-size: 12px; color: #98989d; margin-top: 4px; }
    .toggle { position: relative; width: 51px; height: 31px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #3a3a3c;
      border-radius: 31px;
      transition: 0.3s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 27px;
      width: 27px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .toggle-slider { background: #0a84ff; }
    input:checked + .toggle-slider::before { transform: translateX(20px); }
    .select-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 16px;
      background: #1a1a1a;
      color: #ffffff;
      margin-top: 8px;
    }
    .hidden { display: none !important; }
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a2a;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      z-index: 200;
      animation: toastIn 2s ease;
      white-space: nowrap;
    }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="main-content" id="termineView">
    <div class="header-row">
      <h1 class="header-title">Nächster Termin</h1>
      <button class="settings-btn" id="openSettings">⚙️</button>
    </div>
    <div class="next-card" id="nextCard"></div>
    <div>
      <h2 class="section-title">Meine Termine</h2>
      <div class="appointment-list" id="appointmentList"></div>
    </div>
    <button class="add-button" id="openAddModal">＋ Termin hinzufügen</button>
  </div>

  <div class="main-content hidden" id="settingsView">
    <div class="header-row">
      <h1 class="header-title">Einstellungen</h1>
      <button class="settings-btn" id="closeSettings">✕</button>
    </div>
    <div class="settings-card">
      <div class="settings-row">
        <div><div class="settings-label">🔔 Benachrichtigungen</div><div class="settings-desc">Erinnerungen vor Terminen</div></div>
        <label class="toggle"><input type="checkbox" id="notificationsToggle" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-label">⏰ Erinnerungszeit</div>
      <select class="select-input" id="reminderTimeSelect">
        <option value="24">24 Stunden vorher</option>
        <option value="12">12 Stunden vorher</option>
        <option value="6">6 Stunden vorher</option>
        <option value="1">1 Stunde vorher</option>
        <option value="0.016">1 Minute vorher (Test)</option>
      </select>
    </div>
    <button class="btn-primary" id="testNotification">🔔 Test-Benachrichtigung senden</button>
    <button class="btn-primary" id="requestPermission" style="margin-top:8px;background:#252525;">📱 Benachrichtigung erlauben</button>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Neuer Termin</h2>
      <div class="form-group"><label class="form-label">Titel</label><input class="form-input" type="text" id="titleInput" placeholder="z.B. Zahnarzt" maxlength="50"></div>
      <div class="form-group"><label class="form-label">Datum</label><input class="form-input" type="date" id="dateInput"></div>
      <div class="form-group"><label class="form-label">Uhrzeit</label><input class="form-input" type="time" id="timeInput"></div>
      <button class="btn-primary" id="saveBtn">Speichern</button>
      <button class="btn-secondary" id="closeModal">Abbrechen</button>
    </div>
  </div>

  <div id="toastContainer"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="navTermine"><span class="nav-icon">📅</span><span>Termine</span></button>
    <button class="nav-item" id="navNeu"><span class="nav-icon">➕</span><span>Neu</span></button>
    <button class="nav-item" id="navSettings"><span class="nav-icon">⚙️</span><span>Einstellungen</span></button>
  </nav>
</div>

<script>
(function() {
  'use strict';
  
  let appointments = [];
  let reminderTimeouts = [];
  const STORAGE_KEY = 'termine_v3';

  // DOM
  const termineView = document.getElementById('termineView');
  const settingsView = document.getElementById('settingsView');
  const nextCard = document.getElementById('nextCard');
  const appointmentList = document.getElementById('appointmentList');
  const addModal = document.getElementById('addModal');
  const titleInput = document.getElementById('titleInput');
  const dateInput = document.getElementById('dateInput');
  const timeInput = document.getElementById('timeInput');
  const toastContainer = document.getElementById('toastContainer');
  const notificationsToggle = document.getElementById('notificationsToggle');
  const reminderTimeSelect = document.getElementById('reminderTimeSelect');

  // Hilfsfunktionen
  function parseDateTime(d, t) {
    if(!d||!t) return null;
    const [h,m] = t.split(':').map(Number);
    const dt = new Date(d+'T00:00:00');
    dt.setHours(h,m,0,0);
    return dt;
  }
  function fmtDate(date) {
    const now = new Date();
    const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const target = new Date(date.getFullYear(),date.getMonth(),date.getDate());
    const diff = Math.round((target-today)/86400000);
    if(diff===0) return 'Heute';
    if(diff===1) return 'Morgen';
    return ['So','Mo','Di','Mi','Do','Fr','Sa'][target.getDay()];
  }
  function fmtTime(date) { return date.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }
  function fmtMonth(date) { return ['JAN','FEB','MÄR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DEZ'][date.getMonth()]; }
  function countdown(date) {
    const diff = date - new Date();
    if(diff<=0) return 'Jetzt';
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    if(h>=24) return `Noch ${Math.floor(h/24)} Tage`;
    if(h>0) return `Noch ${h} Std. ${m} Min.`;
    return `Noch ${m} Min.`;
  }
  function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

  // Benachrichtigung
  function notify(appointment) {
    if(!notificationsToggle.checked) return;
    if('Notification' in window && Notification.permission==='granted') {
      new Notification('🔔 Nächster Termin', {
        body: `${fmtDate(appointment.dateObj)} · ${fmtTime(appointment.dateObj)} Uhr - ${appointment.title}`,
        icon: 'icon-192.png',
        tag: appointment.id,
        requireInteraction: true
      });
      console.log('✅ Benachrichtigung gesendet');
    }
  }

  function schedule(appointment) {
    const entry = reminderTimeouts.find(r=>r.id===appointment.id);
    if(entry) clearTimeout(entry.timeoutId);
    reminderTimeouts = reminderTimeouts.filter(r=>r.id!==appointment.id);
    
    if(!notificationsToggle.checked) return;
    const hours = parseFloat(reminderTimeSelect.value);
    const remindAt = new Date(appointment.dateObj.getTime() - hours*3600000);
    const delay = remindAt - new Date();
    if(delay>0) {
      const tid = setTimeout(()=>notify(appointment), delay);
      reminderTimeouts.push({id:appointment.id, timeoutId:tid});
      console.log(`⏰ Erinnerung in ${Math.round(delay/60000)} Min`);
    }
  }

  // Speicher
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appointments.map(a=>({
      id:a.id, title:a.title, dateStr:a.dateStr, timeStr:a.timeStr, dateObj:a.dateObj.toISOString()
    }))));
  }
  function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) {
      try {
        appointments = JSON.parse(raw).map(d=>({
          id:d.id, title:d.title, dateStr:d.dateStr, timeStr:d.timeStr, dateObj:new Date(d.dateObj)
        }));
      } catch(e) { appointments = []; }
    }
    if(appointments.length===0) {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const tomorrow = new Date(now.getTime()+86400000).toISOString().split('T')[0];
      appointments = [
        {id:'1',title:'Zahnarzt',dateStr:today,timeStr:'15:00',dateObj:parseDateTime(today,'15:00')},
        {id:'2',title:'Meeting',dateStr:tomorrow,timeStr:'09:30',dateObj:parseDateTime(tomorrow,'09:30')}
      ].filter(a=>a.dateObj&&a.dateObj>new Date());
    }
    appointments.sort((a,b)=>a.dateObj-b.dateObj);
    save();
  }

  // UI
  function renderNext() {
    const upcoming = appointments.filter(a=>a.dateObj>new Date());
    const next = upcoming[0];
    if(next) {
      nextCard.innerHTML = `<span class="next-badge">📌 ${fmtDate(next.dateObj)}</span><div class="next-time">${fmtTime(next.dateObj)}</div><div class="next-title">${esc(next.title)}</div><div class="countdown">⏱ ${countdown(next.dateObj)}</div>`;
    } else {
      nextCard.innerHTML = '<p style="color:#98989d;text-align:center;padding:20px;">Keine bevorstehenden Termine</p>';
    }
  }
  function renderList() {
    const upcoming = appointments.filter(a=>a.dateObj>new Date());
    if(upcoming.length===0) {
      appointmentList.innerHTML = '<p style="color:#98989d;text-align:center;padding:20px;">Keine Termine</p>';
      return;
    }
    appointmentList.innerHTML = upcoming.map(a=>`
      <div class="list-item">
        <div class="list-date-box"><div class="list-day">${a.dateObj.getDate()}</div><div class="list-month">${fmtMonth(a.dateObj)}</div></div>
        <div class="list-info"><div class="list-time">${fmtTime(a.dateObj)}</div><div class="list-title">${esc(a.title)}</div></div>
        <button class="list-delete" data-id="${a.id}">🗑️</button>
      </div>`).join('');
    document.querySelectorAll('.list-delete').forEach(b=>{
      b.addEventListener('click', function(e){
        e.stopPropagation();
        if(confirm('Löschen?')) {
          appointments = appointments.filter(a=>a.id!==this.dataset.id);
          save(); refreshUI(); showToast('🗑️ Gelöscht');
        }
      });
    });
  }
  function refreshUI() { renderNext(); renderList(); }
  function showToast(m) {
    const t = document.createElement('div'); t.className='toast'; t.textContent=m;
    toastContainer.appendChild(t); setTimeout(()=>t.remove(),2000);
  }

  // Modal
  function openModal() {
    const now = new Date();
    dateInput.value = now.toISOString().split('T')[0];
    timeInput.value = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    titleInput.value = '';
    addModal.classList.add('active');
  }
  function closeModal() { addModal.classList.remove('active'); }
  function addAppt() {
    const title = titleInput.value.trim();
    const ds = dateInput.value;
    const ts = timeInput.value;
    if(!title) { showToast('⚠️ Titel fehlt'); return; }
    if(!ds||!ts) { showToast('⚠️ Datum/Zeit fehlt'); return; }
    const dt = parseDateTime(ds,ts);
    if(!dt||dt<=new Date()) { showToast('⚠️ Vergangenheit'); return; }
    const a = { id:Date.now().toString(), title, dateStr:ds, timeStr:ts, dateObj:dt };
    appointments.push(a);
    appointments.sort((a,b)=>a.dateObj-b.dateObj);
    save(); refreshUI(); closeModal(); schedule(a); showToast('✅ Gespeichert');
  }

  // Navigation
  function showTermine() { termineView.classList.remove('hidden'); settingsView.classList.add('hidden'); }
  function showSettings() { termineView.classList.add('hidden'); settingsView.classList.remove('hidden'); }

  // Events
  document.getElementById('openAddModal').addEventListener('click', openModal);
  document.getElementById('navNeu').addEventListener('click', openModal);
  document.getElementById('saveBtn').addEventListener('click', addAppt);
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('navTermine').addEventListener('click', showTermine);
  document.getElementById('openSettings').addEventListener('click', showSettings);
  document.getElementById('closeSettings').addEventListener('click', showTermine);
  document.getElementById('navSettings').addEventListener('click', showSettings);
  
  addModal.addEventListener('click', function(e) { if(e.target===addModal) closeModal(); });

  // Test-Button
  document.getElementById('testNotification').addEventListener('click', function() {
    if('Notification' in window && Notification.permission==='granted') {
      new Notification('🧪 Test-Benachrichtigung', {
        body: 'Wenn du das siehst, funktionieren Benachrichtigungen!',
        icon: 'icon-192.png',
        requireInteraction: true
      });
      showToast('✅ Benachrichtigung gesendet');
    } else {
      showToast('❌ Bitte erst erlauben');
      Notification.requestPermission();
    }
  });

  document.getElementById('requestPermission').addEventListener('click', function() {
    Notification.requestPermission().then(p => {
      showToast(p==='granted'?'✅ Erlaubt':'❌ '+p);
    });
  });

  // Start
  load();
  refreshUI();
  
  // Benachrichtigung anfordern
  if('Notification' in window && Notification.permission==='default') {
    setTimeout(()=>Notification.requestPermission(), 1000);
  }

  // Countdown aktualisieren
  setInterval(renderNext, 60000);
  
  console.log('✅ App bereit');
  console.log('🔔 Permission:', Notification.permission);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nächster Termin">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Minimalistische Termin-Erinnerungs-App">
  
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  
  <title>Nächster Termin</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 0;
      margin: 0;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: -webkit-fill-available;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    @media (min-width: 431px) {
      .app {
        border-radius: 44px;
        height: 92vh;
        max-height: 900px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-title {
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
      margin-top: 10px;
    }

    .next-card {
      background: linear-gradient(145deg, #1e1e2e 0%, #1a1a2e 100%);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(10, 132, 255, 0.2);
    }

    .next-badge {
      display: inline-block;
      background: rgba(10, 132, 255, 0.2);
      color: #0a84ff;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .next-time {
      font-size: 40px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .next-title {
      font-size: 20px;
      font-weight: 600;
      color: #e5e5e5;
      margin-bottom: 16px;
    }

    .countdown {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 132, 255, 0.12);
      padding: 10px 18px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 15px;
      color: #0a84ff;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .appointment-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list-item {
      background: #252525;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .list-date-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 8px 12px;
      min-width: 48px;
      text-align: center;
    }

    .list-day {
      font-weight: 800;
      font-size: 18px;
      color: #0a84ff;
    }

    .list-month {
      font-size: 10px;
      font-weight: 600;
      color: #98989d;
    }

    .list-info {
      flex: 1;
    }

    .list-time {
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
    }

    .list-title {
      font-weight: 500;
      font-size: 14px;
      color: #e5e5e5;
    }

    .list-delete {
      background: none;
      border: none;
      color: #ff453a;
      font-size: 20px;
      padding: 8px;
      cursor: pointer;
    }

    .add-button {
      background: #0a84ff;
      border: none;
      border-radius: 30px;
      padding: 16px 24px;
      color: white;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      margin-top: auto;
    }

    .add-button:active {
      background: #0066cc;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px 24px;
      background: #1a1a1a;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #98989d;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
    }

    .nav-item.active {
      color: #0a84ff;
    }

    .nav-icon {
      font-size: 22px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-sheet {
      background: #1e1e1e;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 30px;
      width: 100%;
      max-width: 430px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 5px;
      background: #3a3a3c;
      border-radius: 3px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-weight: 600;
      font-size: 13px;
      color: #98989d;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 16px;
      background: #1a1a1a;
      color: #ffffff;
      -webkit-appearance: none;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #0a84ff;
    }

    .form-input::placeholder {
      color: #636366;
    }

    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
      min-height: 48px;
    }

    .btn-primary {
      background: #0a84ff;
      border: none;
      color: white;
      font-weight: 700;
      padding: 16px;
      border-radius: 30px;
      width: 100%;
      font-size: 17px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-primary:active {
      background: #0066cc;
    }

    .btn-secondary {
      background: transparent;
      border: none;
      color: #98989d;
      font-weight: 600;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a2a;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      z-index: 200;
      animation: toastIn 2s ease;
    }

    @keyframes toastIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="main-content" id="homeView">
    <h1 class="header-title">Nächster Termin</h1>

    <div class="next-card" id="nextCard"></div>

    <div>
      <h2 class="section-title">Meine Termine</h2>
      <div class="appointment-list" id="appointmentList"></div>
    </div>

    <button class="add-button" id="openAddModal">＋ Termin hinzufügen</button>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Neuer Termin</h2>
      
      <div class="form-group">
        <label class="form-label">Titel</label>
        <input class="form-input" type="text" id="titleInput" placeholder="z.B. Zahnarzt" maxlength="50">
      </div>
      
      <div class="form-group">
        <label class="form-label">Datum</label>
        <input class="form-input" type="date" id="dateInput">
      </div>
      
      <div class="form-group">
        <label class="form-label">Uhrzeit</label>
        <input class="form-input" type="time" id="timeInput">
      </div>
      
      <button class="btn-primary" id="saveBtn">Speichern</button>
      <button class="btn-secondary" id="closeModal">Abbrechen</button>
    </div>
  </div>

  <div id="toastContainer"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="navTermine">
      <span class="nav-icon">📅</span>
      <span>Termine</span>
    </button>
    <button class="nav-item" id="navNeu">
      <span class="nav-icon">➕</span>
      <span>Neu</span>
    </button>
  </nav>
</div>

<script>
console.log('🚀 App startet...');

// Daten
let appointments = [];

// DOM Elemente
const homeView = document.getElementById('homeView');
const nextCard = document.getElementById('nextCard');
const appointmentList = document.getElementById('appointmentList');
const addModal = document.getElementById('addModal');
const titleInput = document.getElementById('titleInput');
const dateInput = document.getElementById('dateInput');
const timeInput = document.getElementById('timeInput');
const toastContainer = document.getElementById('toastContainer');

// Test
console.log('✅ DOM geladen');
console.log('📅 addModal:', addModal);
console.log('🔘 openAddModal:', document.getElementById('openAddModal'));
console.log('💾 saveBtn:', document.getElementById('saveBtn'));

// Hilfsfunktionen
function parseDateTime(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  const [h, m] = timeStr.split(':').map(Number);
  const d = new Date(dateStr + 'T00:00:00');
  d.setHours(h, m, 0, 0);
  return d;
}

function formatDateShort(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.round((target - today) / 86400000);
  
  if (diff === 0) return 'Heute';
  if (diff === 1) return 'Morgen';
  if (diff === -1) return 'Gestern';
  return ['So','Mo','Di','Mi','Do','Fr','Sa'][target.getDay()];
}

function formatTime(date) {
  return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function getMonthShort(date) {
  return ['JAN','FEB','MÄR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DEZ'][date.getMonth()];
}

function getCountdown(date) {
  const diff = date - new Date();
  if (diff <= 0) return 'Jetzt';
  const hours = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  if (hours >= 24) return `Noch ${Math.floor(hours/24)} Tage`;
  if (hours > 0) return `Noch ${hours} Std. ${mins} Min.`;
  return `Noch ${mins} Min.`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Speichern
function saveData() {
  localStorage.setItem('termine_app', JSON.stringify(appointments.map(a => ({
    id: a.id,
    title: a.title,
    dateStr: a.dateStr,
    timeStr: a.timeStr,
    dateObj: a.dateObj.toISOString()
  }))));
}

function loadData() {
  const raw = localStorage.getItem('termine_app');
  if (raw) {
    try {
      appointments = JSON.parse(raw).map(d => ({
        id: d.id,
        title: d.title,
        dateStr: d.dateStr,
        timeStr: d.timeStr,
        dateObj: new Date(d.dateObj)
      }));
    } catch(e) {
      appointments = [];
    }
  }
  
  if (appointments.length === 0) {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const tomorrow = new Date(now.getTime() + 86400000).toISOString().split('T')[0];
    
    appointments = [
      { id: '1', title: 'Zahnarzt', dateStr: today, timeStr: '15:00', dateObj: parseDateTime(today, '15:00') },
      { id: '2', title: 'Meeting', dateStr: tomorrow, timeStr: '09:30', dateObj: parseDateTime(tomorrow, '09:30') }
    ].filter(a => a.dateObj && a.dateObj > new Date());
  }
  
  appointments.sort((a, b) => a.dateObj - b.dateObj);
  saveData();
}

// Rendern
function renderNextCard() {
  const upcoming = appointments.filter(a => a.dateObj > new Date());
  const next = upcoming[0];
  
  if (next) {
    nextCard.innerHTML = `
      <span class="next-badge">📌 ${formatDateShort(next.dateObj)}</span>
      <div class="next-time">${formatTime(next.dateObj)}</div>
      <div class="next-title">${escapeHtml(next.title)}</div>
      <div class="countdown">⏱ ${getCountdown(next.dateObj)}</div>
    `;
  } else {
    nextCard.innerHTML = `<p style="color:#98989d;text-align:center;padding:20px;">Keine bevorstehenden Termine</p>`;
  }
}

function renderList() {
  const upcoming = appointments.filter(a => a.dateObj > new Date());
  
  if (upcoming.length === 0) {
    appointmentList.innerHTML = '<p style="color:#98989d;text-align:center;padding:20px;">Keine anstehenden Termine</p>';
    return;
  }
  
  appointmentList.innerHTML = upcoming.map(a => `
    <div class="list-item">
      <div class="list-date-box">
        <div class="list-day">${a.dateObj.getDate()}</div>
        <div class="list-month">${getMonthShort(a.dateObj)}</div>
      </div>
      <div class="list-info">
        <div class="list-time">${formatTime(a.dateObj)}</div>
        <div class="list-title">${escapeHtml(a.title)}</div>
      </div>
      <button class="list-delete" data-id="${a.id}">🗑️</button>
    </div>
  `).join('');
  
  document.querySelectorAll('.list-delete').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Termin löschen?')) {
        appointments = appointments.filter(a => a.id !== this.dataset.id);
        saveData();
        refreshUI();
        showToast('🗑️ Gelöscht');
      }
    });
  });
}

function refreshUI() {
  renderNextCard();
  renderList();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// Modal
function openModal() {
  console.log('📂 openModal aufgerufen');
  const now = new Date();
  dateInput.value = now.toISOString().split('T')[0];
  timeInput.value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  titleInput.value = '';
  addModal.classList.add('active');
  console.log('✅ Modal geöffnet');
}

function closeModal() {
  addModal.classList.remove('active');
}

function addAppointment() {
  const title = titleInput.value.trim();
  const dateStr = dateInput.value;
  const timeStr = timeInput.value;
  
  if (!title) { showToast('⚠️ Titel eingeben'); return; }
  if (!dateStr) { showToast('⚠️ Datum wählen'); return; }
  if (!timeStr) { showToast('⚠️ Uhrzeit wählen'); return; }
  
  const dateObj = parseDateTime(dateStr, timeStr);
  if (!dateObj || dateObj <= new Date()) {
    showToast('⚠️ Termin in der Vergangenheit');
    return;
  }
  
  appointments.push({
    id: Date.now().toString(),
    title, dateStr, timeStr, dateObj
  });
  
  appointments.sort((a, b) => a.dateObj - b.dateObj);
  saveData();
  refreshUI();
  closeModal();
  showToast('✅ Gespeichert');
}

// Event Listener
console.log('🔧 Registriere Events...');

document.getElementById('openAddModal').addEventListener('click', function() {
  console.log('🟢 Button geklickt!');
  openModal();
});

document.getElementById('navNeu').addEventListener('click', function() {
  console.log('🟢 Nav-Neu geklickt!');
  openModal();
});

document.getElementById('saveBtn').addEventListener('click', function() {
  console.log('🟢 Speichern geklickt!');
  addAppointment();
});

document.getElementById('closeModal').addEventListener('click', function() {
  console.log('🟢 Abbrechen geklickt!');
  closeModal();
});

document.getElementById('navTermine').addEventListener('click', function() {
  closeModal();
});

addModal.addEventListener('click', function(e) {
  if (e.target === addModal) closeModal();
});

console.log('✅ Alle Events registriert');

// Start
loadData();
refreshUI();
console.log('🎉 App fertig geladen');
</script>
</body>
</html>
